<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VivaFest | Log In</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-cover bg-center bg-fixed"
style="background-image: url('https://images.unsplash.com/photo-1507878866276-a947ef722fee')">

  <!-- OVERLAY -->
  <div class="flex flex-col min-h-screen bg-gradient-to-br from-pink-500/60 via-purple-600/60 to-indigo-600/60 backdrop-blur-sm">

    <!-- LOGIN SECTION -->
    <div class="flex-grow flex items-center justify-center px-4">

      <div class="bg-white/20 backdrop-blur-xl border border-white/30 shadow-2xl rounded-3xl p-10 w-full max-w-md text-white">

        <h2 class="text-3xl font-bold mb-6 text-center">Log In</h2>

        <input type="email" placeholder="Email"
          class="w-full mb-4 p-3 rounded-xl bg-white/20 placeholder-white/70 focus:outline-none">

        <input type="password" placeholder="Password"
          class="w-full mb-4 p-3 rounded-xl bg-white/20 placeholder-white/70 focus:outline-none">

        <div class="flex justify-between text-sm mb-6">
          <label class="flex items-center gap-2">
            <input type="checkbox">
            Remember me
          </label>
          <a href="#" class="hover:text-pink-300">Forgot password?</a>
        </div>

        <button
          class="w-full bg-pink-500 hover:bg-pink-600 py-3 rounded-xl font-semibold transition">
          Log In
        </button>

        <p class="text-center text-sm mt-6">
          Don't have an account?
          <a href="#" class="text-pink-300 hover:text-pink-400 font-medium">Sign up</a>
        </p>

      </div>
    </div>

    <!-- FOOTER -->
    <footer class="w-full bg-white/10 backdrop-blur-xl border-t border-white/20">
      <div class="max-w-7xl mx-auto px-10 py-14 grid md:grid-cols-4 gap-10 text-white">

        <div>
          <h3 class="text-xl font-bold mb-4">VivaFest 🎉</h3>
          <p>Discover concerts, festivals and conferences in Nairobi, Kenya.</p>
        </div>

        <div>
          <h4 class="font-semibold mb-3">Quick Links</h4>
          <ul class="space-y-2">
            <li><a href="#" class="hover:text-pink-300">Home</a></li>
            <li><a href="#" class="hover:text-pink-300">Upcoming Events</a></li>
            <li><a href="#" class="hover:text-pink-300">Tickets</a></li>
          </ul>
        </div>

        <div>
          <h4 class="font-semibold mb-3">Contact</h4>
          <p>Nairobi, Kenya</p>
          <p>info@vivafest.com</p>
        </div>

        <div>
          <h4 class="font-semibold mb-3">Stay Updated</h4>
          <button class="bg-pink-500 hover:bg-pink-600 px-4 py-2 rounded-lg transition">
            Subscribe
          </button>
        </div>

      </div>

      <div class="text-center text-sm py-4 border-t border-white/20 text-white/70">
        © 2026 VivaFest. All rights reserved.
      </div>
    </footer>

  </div>

</body>
</html>
